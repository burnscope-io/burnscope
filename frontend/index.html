<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>burnscope</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 12px 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header h1 { font-size: 18px; font-weight: 600; color: #58a6ff; }
        
        .mode-tabs {
            display: flex;
            gap: 4px;
            background: #21262d;
            padding: 4px;
            border-radius: 8px;
        }
        .mode-tab {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            background: transparent;
            color: #8b949e;
            transition: all 0.2s;
        }
        .mode-tab:hover { color: #c9d1d9; }
        .mode-tab.active { background: #0d1117; color: #58a6ff; }
        
        .status {
            margin-left: auto;
            font-size: 13px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; }
        .status-dot.recording { background: #f85149; }
        .status-dot.comparing { background: #58a6ff; }
        
        .content { flex: 1; display: flex; overflow: hidden; }
        
        .sidebar {
            width: 280px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #30363d;
            font-size: 13px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
        }
        
        .config-section { padding: 16px; }
        .config-row { margin-bottom: 12px; }
        .config-label { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
        select, input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 14px;
        }
        select:focus, input:focus { outline: none; border-color: #58a6ff; }
        
        .actions { padding: 16px; margin-top: auto; }
        button.primary {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #238636;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        button.primary:hover { background: #2ea043; }
        button.primary:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        button.primary.stop { background: #f85149; }
        button.primary.stop:hover { background: #da3633; }
        
        .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .records-header {
            padding: 12px 16px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            font-size: 13px;
            color: #8b949e;
        }
        .records { flex: 1; overflow-y: auto; padding: 8px 0; font-family: 'Monaco', 'Menlo', monospace; font-size: 12px; }
        
        .record-row {
            display: flex;
            align-items: center;
            padding: 4px 16px;
            gap: 8px;
        }
        .record-row.baseline { background: #161b22; }
        .record-row.compare { background: #0d1117; }
        .record-row .label { width: 40px; color: #484f58; }
        .record-row .dir { width: 24px; font-weight: 600; }
        .record-row .dir.tx { color: #f0883e; }
        .record-row .dir.rx { color: #58a6ff; }
        .record-row .size { width: 60px; color: #8b949e; }
        .record-row .data { flex: 1; color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .record-row .result { width: 24px; text-align: center; }
        .record-row .result.match { color: #238636; }
        .record-row .result.diff { color: #f85149; }
        
        .divider { height: 1px; background: #21262d; margin: 4px 16px; }
        
        .footer {
            padding: 12px 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .footer .stats { display: flex; gap: 24px; }
        .footer .stat { color: #8b949e; }
        .footer .stat-value { font-weight: 600; margin-left: 8px; }
        .footer .stat-value.match { color: #238636; }
        .footer .stat-value.diff { color: #f85149; }
        
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #484f58;
        }
        .empty-state p { font-size: 14px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>burnscope</h1>
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="record">录制</button>
            <button class="mode-tab" data-mode="compare">对比</button>
        </div>
        <div class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">就绪</span>
        </div>
    </div>
    
    <div class="content">
        <div class="sidebar">
            <div class="sidebar-header">配置</div>
            <div class="config-section">
                <div class="config-row">
                    <div class="config-label">串口</div>
                    <select id="port-select"><option value="">刷新中...</option></select>
                </div>
                <div class="config-row">
                    <div class="config-label">波特率</div>
                    <select id="baud-select">
                        <option value="115200">115200</option>
                        <option value="230400">230400</option>
                        <option value="460800">460800</option>
                        <option value="921600">921600</option>
                    </select>
                </div>
            </div>
            <div class="actions">
                <button class="primary" id="action-btn">开始录制</button>
            </div>
        </div>
        
        <div class="main-panel">
            <div class="records-header">原始字节流</div>
            <div class="records" id="records">
                <div class="empty-state" id="empty-state">
                    <p>点击"开始录制"采集基准数据</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="stats">
            <span class="stat">匹配: <span class="stat-value match" id="stat-match">0</span></span>
            <span class="stat">差异: <span class="stat-value diff" id="stat-diff">0</span></span>
        </div>
        <div class="stat" id="pty-path"></div>
    </div>
    
    <script src="./src/main.js"></script>
</body>
</html>
