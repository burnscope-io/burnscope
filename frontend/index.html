<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>burnscope</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 12px 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header h1 { font-size: 18px; font-weight: 600; color: #58a6ff; }
        
        .status {
            margin-left: auto;
            font-size: 13px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; }
        .status-dot.running { background: #238636; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .content { flex: 1; display: flex; overflow: hidden; }
        
        .sidebar {
            width: 320px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        
        .section {
            padding: 16px;
            border-bottom: 1px solid #30363d;
        }
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        
        .port-display {
            background: #0d1117;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .port-label {
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 4px;
        }
        .port-value {
            font-size: 16px;
            font-family: 'Monaco', 'Menlo', monospace;
            color: #58a6ff;
            cursor: pointer;
        }
        .port-value:hover { color: #79c0ff; }
        .port-hint {
            font-size: 10px;
            color: #484f58;
            margin-top: 4px;
        }
        
        .config-row { margin-bottom: 12px; }
        .config-label { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
        select, input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 13px;
        }
        select:focus, input:focus { outline: none; border-color: #58a6ff; }
        
        .actions { padding: 16px; margin-top: auto; }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }
        button.primary { background: #238636; color: white; }
        button.primary:hover { background: #2ea043; }
        button.primary.stop { background: #f85149; }
        button.secondary { background: #21262d; color: #c9d1d9; }
        button.secondary:hover { background: #30363d; }
        
        .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .records-header {
            padding: 12px 16px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            font-size: 13px;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }
        
        .records { flex: 1; overflow-y: auto; padding: 8px 0; font-family: 'Monaco', 'Menlo', monospace; font-size: 12px; }
        
        .record-row {
            display: flex;
            align-items: center;
            padding: 4px 16px;
            gap: 8px;
        }
        .record-row .dir { width: 24px; font-weight: 600; }
        .record-row .dir.tx { color: #f0883e; }
        .record-row .dir.rx { color: #58a6ff; }
        .record-row .size { width: 60px; color: #8b949e; }
        .record-row .data { flex: 1; color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .record-row .result { width: 24px; text-align: center; }
        .record-row .result.match { color: #238636; }
        .record-row .result.diff { color: #f85149; }
        .record-row.replay { background: #161b22; }
        
        .footer {
            padding: 12px 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 24px;
            font-size: 13px;
        }
        .footer .stat { color: #8b949e; }
        .footer .stat-value { font-weight: 600; margin-left: 8px; }
        .footer .stat-value.match { color: #238636; }
        .footer .stat-value.diff { color: #f85149; }
        
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>burnscope</h1>
        <div class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">就绪</span>
        </div>
    </div>
    
    <div class="content">
        <div class="sidebar">
            <!-- 上位串口 -->
            <div class="section">
                <div class="section-title">上位串口（代理）</div>
                <div class="port-display">
                    <div class="port-label">烧录工具连接此端口</div>
                    <div class="port-value" id="upper-port" onclick="copyPort('upper')">初始化中...</div>
                    <div class="port-hint">点击复制</div>
                </div>
            </div>
            
            <!-- 下位串口 -->
            <div class="section">
                <div class="section-title">下位串口（目标）</div>
                <div class="config-row">
                    <div class="config-label">选择类型</div>
                    <select id="lower-type" onchange="onLowerTypeChange()">
                        <option value="virtual">虚拟串口（测试）</option>
                        <option value="physical">物理串口（录制）</option>
                        <option value="compare">基准对比</option>
                    </select>
                </div>
                <div id="virtual-config">
                    <div class="port-display">
                        <div class="port-label">测试程序连接此端口</div>
                        <div class="port-value" id="lower-port" onclick="copyPort('lower')">初始化中...</div>
                        <div class="port-hint">点击复制</div>
                    </div>
                </div>
                <div id="physical-config" style="display:none;">
                    <div class="config-row">
                        <div class="config-label">物理串口</div>
                        <select id="physical-port"></select>
                    </div>
                    <div class="config-row">
                        <div class="config-label">波特率</div>
                        <select id="baud-rate">
                            <option value="115200">115200</option>
                            <option value="230400">230400</option>
                            <option value="460800">460800</option>
                            <option value="921600">921600</option>
                        </select>
                    </div>
                </div>
                <div id="compare-config" style="display:none;">
                    <div class="config-row">
                        <div class="config-label">基准文件</div>
                        <input type="text" id="golden-file" value="session.golden">
                    </div>
                    <div class="config-row">
                        <button class="secondary" onclick="loadGolden()">加载基准</button>
                    </div>
                    <div id="golden-info" style="font-size:12px;color:#8b949e;"></div>
                </div>
            </div>
            
            <!-- 操作 -->
            <div class="actions">
                <button class="primary" id="action-btn" onclick="toggleAction()">开始</button>
                <button class="secondary" onclick="saveSession()">保存录制</button>
            </div>
        </div>
        
        <div class="main-panel">
            <div class="records-header">
                <span>数据流</span>
                <span id="baud-display"></span>
            </div>
            <div class="records" id="records">
                <div class="empty-state" id="empty-state">
                    <p>等待数据...</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <span class="stat">TX: <span class="stat-value" id="stat-tx">0</span></span>
        <span class="stat">RX: <span class="stat-value" id="stat-rx">0</span></span>
        <span class="stat">匹配: <span class="stat-value match" id="stat-match">0</span></span>
        <span class="stat">差异: <span class="stat-value diff" id="stat-diff">0</span></span>
    </div>
    
    <script src="./src/main.js"></script>
</body>
</html>
